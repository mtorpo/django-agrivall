<nav class="navbar navbar-expand-lg bg-white border-bottom py-3" id="mainNav">

    <div class="container">

        <!-- Logo -->
        <a href="{% url 'index' %}" class="navbar-brand fw-semibold text-success">
            AGRIVALL
        </a>

        <!-- Hamburguesa -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            <!-- Enlaces -->
            <ul class="navbar-nav mx-auto gap-3">

                <li class="nav-item">
                    <a href="{% url 'productos' %}" class="nav-link text-dark">
                        Productos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'blog' %}" class="nav-link text-dark">
                        Blog
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'casilla' %}" class="nav-link text-dark">
                        Casilla
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-dark">
                        Quiénes somos
                    </a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link text-dark">
                        Contacto
                    </a>
                </li>
            </ul>

            <!-- Derecha, logout y carrito si login -->
            <div class="d-flex align-items-center gap-3">

                {% if user.is_authenticated %}
                    <!-- Buscar -->
                    <form class="d-none d-lg-flex">
                        <input
                            class="form-control form-control-sm rounded-pill"
                            type="search"
                            placeholder="Buscar"
                        >
                    </form>

                    <!-- Carrito, span para que cuando actualice no se pierda el carro -->
                    <a href="{% url 'checkout' %}" class="text-decoration-none text-dark" >
                        🛒 <span id="cart-count"> {{ carrito_total }} </span>
                    </a>
                    <!-- Usuario -->
                    <span class="text-muted small">
                        {{ user.username }}
                    </span>

                    <!-- Logout -->
                    <form method="post" action="{% url 'logout' %}" class="m-0">
                        {% csrf_token %}
                        <button
                            type="submit"
                            class="btn btn-sm btn-outline-success rounded-pill"
                        >
                            Cerrar sesión
                        </button>
                    </form>

                {% else %}

                    <a href="{% url 'login' %}"
                        class="btn btn-sm btn-outline-dark rounded-pill"
                    >
                        Iniciar sesión
                    </a>

                    <a
                        href="{% url 'register' %}"
                        class="btn btn-sm btn-success rounded-pill"
                    >
                        Registrarse
                    </a>

                {% endif %}

            </div>

        </div>
    </div>
</nav>
