<nav class="main-nav" id="mainNav">

    <div class="nav-content">

        <a href="{% url 'index' %}" class="nav-logo">
            AGRIVALL
        </a>

        <input type="checkbox" id="nav-toggle" class="nav-toggle">

        <label for="nav-toggle" class="nav-toggle-label">
            ☰
        </label>

        <div class="nav-menu">

            <ul class="nav-links">

                <li>
                    <a
                        href="{% url 'index' %}"
                        class="{% if request.resolver_match.url_name == 'index' %}nav-active{% endif %}"
                    >
                        Inicio
                    </a>
                </li>

                <li>
                    <a
                        href="{% url 'productos' %}"
                        class="{% if request.resolver_match.url_name == 'productos' %}nav-active{% endif %}"
                    >
                        Productos
                    </a>
                </li>

                <li>
                    <a
                        href="{% url 'casilla' %}"
                        class="{% if request.resolver_match.url_name == 'casilla' %}nav-active{% endif %}"
                    >
                        Casilla
                    </a>
                </li>

                <li>
                    <a
                        href="{% url 'blog' %}"
                        class="{% if request.resolver_match.url_name == 'blog' %}nav-active{% endif %}"
                    >
                        Blog
                    </a>
                </li>

            </ul>

            <div class="nav-actions">

                {% if user.is_authenticated %}

                    <a href="{% url 'checkout' %}" class="nav-cart">
                        🛒 <span id="cart-count">{{ carrito_total }}</span>
                    </a>

                    {% if user.is_superuser %}
                        <a href="{% url 'dashboard' %}" class="nav-button dashboard">
                            Dashboard
                        </a>
                    {% endif %}

                    <span class="nav-user">
                        {{ user.username }}
                    </span>

                    <form method="post" action="{% url 'logout' %}" class="nav-form">
                        {% csrf_token %}

                        <button type="submit" class="nav-button nav-button-outline">
                            Cerrar sesión
                        </button>
                    </form>

                {% else %}

                    <a href="{% url 'login' %}" class="nav-button nav-button-light">
                        Iniciar sesión
                    </a>

                    <a href="{% url 'register' %}" class="nav-button nav-button-green">
                        Registrarse
                    </a>

                {% endif %}

            </div>

        </div>

    </div>

</nav>
