{% if messages %}

    {% for message in messages %}
        <div class="toast-finalizado">
            ✓ {{ message }}
        </div>
    {% endfor %}

{% endif %}

<script>

document.addEventListener("DOMContentLoaded", () => {

    const toasts = document.querySelectorAll(".toast-finalizado");

    toasts.forEach((toast) => {

        setTimeout(() => {
            toast.classList.add("visible");
        },100);

        setTimeout(() => {

            toast.classList.remove("visible");

            setTimeout(() => {
                toast.remove();
            },300);

        },3000);

    });

});

</script>
